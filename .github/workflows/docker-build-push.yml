name: Build and Push Image to GAR

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Java artifact
    types:
      - completed

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download built JAR artifact (when triggered by jar workflow)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: auth-demo-jar
          path: target
          run-id: ${{ github.event.workflow_run.id }}

      - name: Build JAR locally (fallback for manual dispatch)
        if: ${{ github.event_name != 'workflow_run' }}
        run: mvn -B -DskipTests package

      - name: Verify JAR exists (fallback to local build if missing)
        run: |
          set -e
          if compgen -G "target/*.jar" > /dev/null; then
            echo "Found JAR:"; ls -la target/*.jar
            exit 0
          fi

          echo "JAR not found in target/. Attempting local Maven build as fallback..."
          if command -v mvn >/dev/null 2>&1; then
            mvn -B -DskipTests package
          else
            echo "Maven not installed on runner. Cannot build JAR locally." >&2
            exit 1
          fi

          if compgen -G "target/*.jar" > /dev/null; then
            echo "Built JAR:"; ls -la target/*.jar
          else
            echo "Failed to produce JAR after local build." >&2
            exit 1
          fi

      - name: Set up Google Cloud authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build --no-cache -t us-docker.pkg.dev/practice-422202/machala/login:v1.0 .

      - name: Push image to Artifact Registry
        run: docker push us-docker.pkg.dev/practice-422202/machala/login:v1.0

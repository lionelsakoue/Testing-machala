name: Build and Push Image to GAR

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Java artifact
    types:
      - completed

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for local Maven builds)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Download built JAR artifact (when triggered by jar workflow)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: auth-demo-jar
          path: target
          run-id: ${{ github.event.workflow_run.id }}

      - name: Ensure JAR exists (build locally if needed)
        run: |
          set -e
          if compgen -G "target/*.jar" > /dev/null; then
            echo "JAR found in target/:"
            ls -la target/*.jar
          else
            echo "JAR not found in target/. Building locally with Maven..."
            mvn -B -DskipTests package
            if compgen -G "target/*.jar" > /dev/null; then
              echo "JAR built successfully:"
              ls -la target/*.jar
            else
              echo "ERROR: Failed to build JAR with Maven"
              exit 1
            fi
          fi

      - name: Set up Google Cloud authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build --no-cache -t us-docker.pkg.dev/practice-422202/machala/login:v1.0 .

      - name: Push image to Artifact Registry
        run: docker push us-docker.pkg.dev/practice-422202/machala/login:v1.0

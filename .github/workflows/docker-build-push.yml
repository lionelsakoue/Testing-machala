name: Build and Push Image to GAR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and push'
        required: true
        default: 'v1.0'
  push:
    branches:
      - main

env:
  IMAGE: us-docker.pkg.dev/practice-422202/machala/login

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # No Maven setup and no JAR download here on purpose.
      # The Dockerfile is multi-stage: it compiles the application from source
      # inside the build stage. Passing a pre-built JAR into the image is what
      # previously allowed a stale target/ to be shipped, so the image no longer
      # matches the repository.

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Google Cloud authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build Docker image (compiles from source)
        run: |
          docker build \
            -t "${IMAGE}:${{ steps.tag.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push "${IMAGE}:${{ steps.tag.outputs.tag }}"
          docker push "${IMAGE}:latest"

      - name: Summary
        run: |
          echo "Pushed ${IMAGE}:${{ steps.tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

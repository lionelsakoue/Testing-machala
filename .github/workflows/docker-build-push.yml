name: Build and Push Image to GAR

on:
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download built JAR artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: auth-demo-jar
          path: target
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify JAR exists
        run: |
          if [ ! -f target/*.jar ]; then
            echo "No built JAR was found in target/. Run the 'Build Java artifact' workflow first."
            exit 1
          fi
          ls -la target

      - name: Set up Google Cloud authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build --no-cache -t us-docker.pkg.dev/practice-422202/static/login:v1.0 .

      - name: Push image to Artifact Registry
        run: docker push us-docker.pkg.dev/practice-422202/static/login:v1.0

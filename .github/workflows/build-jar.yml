name: Build and Test

# Compiles and tests the application on every push and pull request.
# This workflow does NOT produce an artifact for the image build: the Dockerfile
# is multi-stage and compiles from source itself. This job exists purely to catch
# compilation and test failures early.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Compile and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

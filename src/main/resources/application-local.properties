# Local development profile: in-memory H2, no Oracle, no Docker, no cluster.
#
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# The app starts on http://localhost:8080 with an empty database. Register a
# user at /register, then log in with it at /login.

spring.datasource.url=jdbc:h2:mem:authdemo;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Prints exactly what the security filter chain does with each request, including
# CSRF rejections. Invaluable when a login POST appears to do nothing.
logging.level.org.springframework.security=DEBUG

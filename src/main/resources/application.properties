# Default profile: Oracle.
#
# Every value below can be overridden by an environment variable, which is how
# the Kubernetes deployment supplies them (SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_PASSWORD, and so on). The values here are only a fallback
# for running against a local docker-compose Oracle.
#
# For local development without Oracle, run with the "local" profile instead:
#   mvn spring-boot:run -Dspring-boot.run.profiles=local

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1522/FREEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:system}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# The app runs behind ingress-nginx. Without this, Spring does not honour the
# X-Forwarded-* headers, and redirects issued during the login flow can be built
# against the wrong scheme or host.
server.forward-headers-strategy=framework
